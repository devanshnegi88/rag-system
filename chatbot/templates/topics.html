<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Detected Topics</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            RAG Intelligence
        </div>

        <div class="nav-links">

            <a href="/">Chat</a>

            <a href="/persona">Persona</a>

            <a href="/topics">Topics</a>

        </div>

    </div>

    <!-- MAIN -->

    <div class="container">

        <h1>Detected Topics</h1>

        {% if topics %}

            {% for topic in topics %}

            <div class="card">

                <h2>
                    {{ topic.get("label", "Unknown Topic") }}
                </h2>

                <p>

                    <strong>Messages:</strong>

                    {{ topic.get("start", 0) }}

                    →

                    {{ topic.get("end", 0) }}

                </p>

                <p class="summary">

                    {{ topic.get("summary", "") }}

                </p>

            </div>

            {% endfor %}

        {% else %}

            <div class="card">

                <p>No topics available.</p>

            </div>

        {% endif %}

    </div>

</body>
</html>
