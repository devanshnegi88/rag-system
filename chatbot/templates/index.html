<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>RAG Conversation Intelligence</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- NAVBAR -->
    <!-- ========================= -->

    <div class="navbar">

        <div class="logo">
            RAG Intelligence
        </div>

        <div class="nav-links">

            <a href="/">Chat</a>

            <a href="/persona">Persona</a>

            <a href="/topics">Topics</a>

        </div>

    </div>

    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->

    <div class="container">

        <h1>Conversation Intelligence System</h1>

        <p class="subtitle">
            AI-powered topic-aware RAG + persona extraction
        </p>

        <!-- CHAT AREA -->

        <div id="chat-box"></div>

        <!-- INPUT -->

        <div class="input-area">

            <input
                type="text"
                id="query"
                placeholder="Ask something..."
            >

            <button onclick="sendQuery()">
                Send
            </button>

        </div>

    </div>

    <script src="/static/app.js"></script>

</body>
</html>
